# teleop.yaml
# Configuration for teleop_twist_joy with QoS settings

/teleop_node:
  ros__parameters:
    axis_angular:
      pitch: -1
      roll: -1
      yaw: 3
    axis_linear:
      x: 1
      y: -1
      z: -1
    enable_button: 5
    enable_turbo_button: -1
    frame: teleop_twist_joy
    inverted_reverse: false
    publish_stamped_twist: false
    qos_overrides:
      /parameter_events:
        publisher:
          depth: 100
          durability: volatile
          history: keep_last
          reliability: reliable
      /cmd_vel_joy:
        publisher:
          reliability: best_effort
          depth: 1
          history: keep_last
          durability: volatile
    require_enable_button: true
    scale_angular:
      pitch: 0.0
      roll: 0.0
      yaw: 1.0
    scale_angular_turbo:
      pitch: 0.0
      roll: 0.0
      yaw: 1.0
    scale_linear:
      x: 1.0
      y: 0.0
      z: 0.0
    scale_linear_turbo:
      x: 1.0
      y: 0.0
      z: 0.0
    use_sim_time: false